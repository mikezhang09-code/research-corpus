name: Deploy public viewer

on:
  push:
    branches: [main]
    paths:
      - 'portal/public/**'
      - '.github/workflows/deploy-public-viewer.yml'
  workflow_dispatch:        # lets you trigger a deploy manually too

concurrency:
  group: deploy-public-viewer
  cancel-in-progress: false  # never interrupt an in-flight deploy

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: protected-readonly
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal/public/package-lock.json

      - name: Install dependencies
        working-directory: portal/public
        run: npm ci

      # Sync the password gate secret before deploying so a new middleware
      # build never goes live without it (middleware fails closed with 503).
      - name: Sync ADMIN_PASSWORD Worker secret
        working-directory: portal/public
        run: printf '%s' "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

      - name: Build and deploy
        working-directory: portal/public
        run: npm run deploy   # opennextjs-cloudflare build && deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
